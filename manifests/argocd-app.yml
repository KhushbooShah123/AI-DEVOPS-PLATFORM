apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-devops-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KhushbooShah123/AI-DEVOPS-PLATFORM.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true # Agar GitHub se file hata doge, toh K8s se bhi hat dega
      selfHeal: true # Agar koi manually K8s me change kare, toh ArgoCD wapas GitHub jaisa kar dega